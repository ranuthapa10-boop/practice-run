<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LUMIS — Products</title>

  <!-- ✅ Google Tag Manager -->

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
  <!-- End GTM -->

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0b0b; --surface: #131313; --gold: #c9a96e;
      --gold-light: #e8d5b0; --text: #f0ece4; --muted: #7a7570; --border: #222;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 4rem; background: rgba(11,11,11,0.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; letter-spacing: 0.3em; color: var(--gold); text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-cta { background: var(--gold); color: #0b0b0b; padding: 0.6rem 1.5rem; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; font-weight: 500; }

    /* PAGE HEADER */
    .page-header { padding: 10rem 4rem 4rem; border-bottom: 1px solid var(--border); }
    .page-header .eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem,5vw,4rem); font-weight: 300; }

    /* FILTER BAR */
    .filter-bar { padding: 1.5rem 4rem; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; }
    .filter-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-right: 0.5rem; }
    .filter-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 1.1rem; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; font-family: 'DM Sans', sans-serif; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--gold); color: var(--gold); }

    /* PRODUCT GRID */
    .product-grid { padding: 4rem; display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; background: var(--border); }
    .product-card { background: var(--surface); cursor: pointer; overflow: hidden; position: relative; transition: background 0.3s; }
    .product-card:hover { background: #161616; }
    .product-img {
      width: 100%; aspect-ratio: 4/5;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .product-img-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; transition: transform 0.5s ease;
    }
    .product-card:hover .product-img-inner { transform: scale(1.05); }
    .product-info { padding: 1.5rem; border-top: 1px solid var(--border); }
    .product-cat { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.3rem; }
    .product-price { font-size: 0.85rem; color: var(--muted); }
    .product-actions { display: flex; gap: 0; border-top: 1px solid var(--border); }
    .product-actions a, .product-actions button {
      flex: 1; padding: 0.9rem; text-align: center; text-decoration: none;
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
      transition: all 0.3s;
    }
    .btn-add { background: none; color: var(--muted); border-right: 1px solid var(--border) !important; }
    .btn-add:hover { background: var(--border); color: var(--text); }
    .btn-buy { background: var(--gold); color: #0b0b0b; }
    .btn-buy:hover { background: var(--gold-light); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-inner { display: grid; grid-template-columns: 1fr 1fr; }
    .modal-img { background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 6rem; min-height: 300px; }
    .modal-details { padding: 2.5rem; }
    .modal-details .eyebrow { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; }
    .modal-details h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; margin-bottom: 0.5rem; }
    .modal-details .price { font-size: 1.2rem; color: var(--gold); margin-bottom: 1.2rem; }
    .modal-details p { color: var(--muted); font-size: 0.85rem; line-height: 1.8; margin-bottom: 1.5rem; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
    .modal { position: relative; }
    .btn-modal-buy { display: block; width: 100%; background: var(--gold); color: #0b0b0b; padding: 0.9rem; text-align: center; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }

    footer { border-top: 1px solid var(--border); padding: 2.5rem 4rem; display: flex; justify-content: space-between; }
    footer p { font-size: 0.75rem; color: var(--muted); }
    .footer-links { display: flex; gap: 2rem; }
    .footer-links a { font-size: 0.75rem; color: var(--muted); text-decoration: none; }
    .footer-links a:hover { color: var(--gold); }

    @media(max-width:900px){ .product-grid { grid-template-columns: repeat(2,1fr); } .modal-inner { grid-template-columns: 1fr; } }
    @media(max-width:600px){ .product-grid { grid-template-columns: 1fr; padding: 2rem; } nav { padding: 1rem 1.5rem; } .nav-links { display: none; } .page-header { padding: 7rem 1.5rem 2rem; } .filter-bar { padding: 1rem 1.5rem; flex-wrap: wrap; } }
  </style>
</head>
<body>

<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<nav>
  <a href="index.html" class="logo">LUMIS</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html" class="active">Products</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="form.html">Enquire</a></li>
  </ul>
  <a href="checkout.html" class="nav-cta">Shop Now</a>
</nav>

<div class="page-header">
  <div class="eyebrow">Our Collection</div>
  <h1>Curated for excellence</h1>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
  <button class="filter-btn" onclick="filterProducts('home',this)">Home</button>
  <button class="filter-btn" onclick="filterProducts('accessories',this)">Accessories</button>
  <button class="filter-btn" onclick="filterProducts('lifestyle',this)">Lifestyle</button>
</div>

<div class="product-grid" id="productGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-inner">
      <div class="modal-img" id="modalImg"></div>
      <div class="modal-details">
        <div class="eyebrow" id="modalCat"></div>
        <h2 id="modalName"></h2>
        <div class="price" id="modalPrice"></div>
        <p id="modalDesc"></p>
        <a href="checkout.html" class="btn-modal-buy" id="modalBuyBtn" onclick="trackProductClick()">Add to Checkout →</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>© 2024 LUMIS. All rights reserved.</p>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="checkout.html">Checkout</a>
    <a href="contact.html">Contact</a>
    <a href="form.html">Enquire</a>
  </div>
</footer>

<script>
  window.dataLayer = window.dataLayer || [];
  dataLayer.push({ event: 'page_view', page_title: 'Products', page_path: '/products.html' });

  const products = [
    { id:1, name:'Obsidian Vessel', cat:'home', catLabel:'Home Objects', price:'$480', emoji:'🏺', desc:'A hand-thrown ceramic vessel with a deep obsidian glaze, fired in a wood kiln over 36 hours. Each piece is entirely unique.' },
    { id:2, name:'Meridian Watch Strap', cat:'accessories', catLabel:'Accessories', price:'$220', emoji:'⌚', desc:'Full-grain calfskin leather, vegetable-tanned in Italy. Available in four natural colorways that age beautifully.' },
    { id:3, name:'Grove Candle Set', cat:'lifestyle', catLabel:'Lifestyle', price:'$145', emoji:'🕯️', desc:'Triple-wick soy wax candles infused with hand-foraged botanicals. A 60-hour burn time in a reusable stone vessel.' },
    { id:4, name:'Linen Throw', cat:'home', catLabel:'Home Objects', price:'$380', emoji:'🧶', desc:'Woven from 100% European flax on heritage looms. Stonewashed to a whisper-soft finish that only improves with time.' },
    { id:5, name:'Brass Card Holder', cat:'accessories', catLabel:'Accessories', price:'$165', emoji:'🪙', desc:'Precision-machined solid brass with a raw, unlacquered finish. Develops a unique patina through everyday carry.' },
    { id:6, name:'Hinoki Bath Set', cat:'lifestyle', catLabel:'Lifestyle', price:'$290', emoji:'🌿', desc:'Japanese cypress (Hinoki) soap dish, cup, and tray. Naturally antibacterial and sensorially extraordinary.' },
  ];

  let currentProduct = null;

  function renderProducts(filter='all') {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
    filtered.forEach(p => {
      grid.innerHTML += `
        <div class="product-card" data-cat="${p.cat}">
          <div class="product-img" onclick="openModal(${p.id})">
            <div class="product-img-inner">${p.emoji}</div>
          </div>
          <div class="product-info">
            <div class="product-cat">${p.catLabel}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${p.price}</div>
          </div>
          <div class="product-actions">
            <button class="btn-add" onclick="addToCart(${p.id})">Add to Cart</button>
            <a class="btn-buy" href="checkout.html" onclick="trackBuyNow(${p.id})">Buy Now</a>
          </div>
        </div>`;
    });
  }

  function filterProducts(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts(cat);
    dataLayer.push({ event: 'filter_products', filter_category: cat });
  }

  function openModal(id) {
    const p = products.find(x => x.id === id);
    currentProduct = p;
    document.getElementById('modalImg').textContent = p.emoji;
    document.getElementById('modalCat').textContent = p.catLabel;
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalPrice').textContent = p.price;
    document.getElementById('modalDesc').textContent = p.desc;
    document.getElementById('modalOverlay').classList.add('open');
    dataLayer.push({ event: 'product_view', product_name: p.name, product_price: p.price, product_category: p.catLabel });
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    dataLayer.push({ event: 'add_to_cart', product_name: p.name, product_price: p.price });
    alert(`"${p.name}" added to cart!`);
  }

  function trackBuyNow(id) {
    const p = products.find(x => x.id === id);
    dataLayer.push({ event: 'begin_checkout', product_name: p.name, product_price: p.price });
  }

  function trackProductClick() {
    if (currentProduct) {
      dataLayer.push({ event: 'begin_checkout', product_name: currentProduct.name, product_price: currentProduct.price });
    }
  }

  renderProducts();
</script>
</body>
</html>
